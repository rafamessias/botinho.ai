# WhatsApp worker + Redis for local development.
# Next.js orchestration runs via `npm run dev` and uses the same REDIS_URL / WORKER_INTERNAL_TOKEN.

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  whatsapp-worker:
    build:
      context: ./services/whatsapp-worker
      dockerfile: deploy/docker/Dockerfile.worker
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      PORT: "8081"
      WORKER_ID: worker-1
      WORKER_URL: http://localhost:8081
      REDIS_URL: redis://redis:6379
      WORKER_INTERNAL_TOKEN: dev-worker-token
      MAX_SESSIONS_PER_WORKER: "25"
      FIRESTORE_PROJECT_ID: ${FIRESTORE_PROJECT_ID:-}
      SESSION_STORE_DIR: /data/sessions
    volumes:
      - whatsapp-sessions:/data/sessions
    depends_on:
      redis:
        condition: service_healthy

volumes:
  whatsapp-sessions:
